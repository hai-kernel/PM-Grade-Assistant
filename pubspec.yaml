name: pmg_grade
description: Project Management Grading Tool for University Professors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # File picking
  file_picker: ^8.1.2
  # CSV parsing
  csv: ^6.0.0
  # DOCX parsing (Pure Dart)
  archive: ^3.6.1
  xml: ^6.3.0
  # Window management
  window_manager: ^0.4.3
  # Local storage/state
  provider: ^6.1.2
  # JSON serialization
  shared_preferences: ^2.3.2
  # Icons
  flutter_svg: ^2.0.10+1
  # Scroll
  scrollable_positioned_list: ^0.3.8
  # Animations
  flutter_animate: ^4.5.0
  # File system
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
